name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: test-projects/python/requirements.txt

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.1

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          components: llvm-tools-preview, clippy, rustfmt

      - name: Install cargo-llvm-cov
        run: |
          cargo install cargo-llvm-cov --locked --root "$RUNNER_TEMP/cargo-llvm-cov"
          printf '%s\n' "$RUNNER_TEMP/cargo-llvm-cov/bin" >> "$GITHUB_PATH"

      - name: Install cross-language test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r test-projects/python/requirements.txt

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Run standalone tests
        run: npm test

      - name: Run package smoke tests
        run: npm run test:smoke

      - name: Run benchmark budgets
        run: npm run bench:ci

      - name: Run lint
        run: npm run lint
